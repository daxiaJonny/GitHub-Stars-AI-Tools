    <path d="M368 533.1L369.6 537.8H374.5L370.5 540.7L372 545.4L368 542.5L364 545.4L365.5 540.7L361.5 537.8H366.4L368 533.1Z" stroke="#6941F5" stroke-width="1.45" stroke-linejoin="round" />
