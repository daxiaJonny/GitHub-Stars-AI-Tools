    <rect x="30" y="398" width="155" height="96" rx="14" fill="white" fill-opacity="0.97" stroke="#DEE6F2" />
    <rect x="44" y="413" width="32" height="32" rx="9" fill="#EEF5FF" />
    <path d="M52.5 425L58.4 420L69 415V443L58.4 438L52.5 433L47.5 437L44 434L51.4 429L44 424L47.5 421L52.5 425ZM58.4 425.1L55.1 429L58.4 432.9L64.2 436V422L58.4 425.1Z" fill="#3977F6" fill-rule="evenodd" />
    <text x="85" y="424.5" fill="#15233B" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.2" font-weight="700">microsoft</text>
    <text x="85" y="441.5" fill="#64748B" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10.3">vscode</text>
    <path d="M46 463.1L47.6 467.8H52.5L48.5 470.7L50 475.4L46 472.5L42 475.4L43.5 470.7L39.5 467.8H44.4L46 463.1Z" stroke="#6941F5" stroke-width="1.45" stroke-linejoin="round" />
    <text x="57" y="473" fill="#4F5F76" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9.5" font-weight="550">164k</text>
