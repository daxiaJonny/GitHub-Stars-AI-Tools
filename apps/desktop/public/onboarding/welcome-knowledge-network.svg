    <text x="107" y="473" fill="#6A778A" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8.8">TypeScript</text>
  </g>

  <!-- Repository card: chroma-core -->
  <g filter="url(#card-shadow)">
    <rect x="352" y="468" width="168" height="96" rx="14" fill="white" fill-opacity="0.97" stroke="#DEE6F2" />
    <rect x="366" y="483" width="32" height="32" rx="9" fill="#F0EDFF" />
    <circle cx="382" cy="499" r="9.5" fill="#7357F5" />
