<svg
  xmlns="http://www.w3.org/2000/svg"
  width="100%"
  height="100%"
  viewBox="0 0 560 600"
  fill="none"
  preserveAspectRatio="xMidYMid meet"
  role="img"
  aria-labelledby="knowledge-network-title knowledge-network-desc"
>
  <title id="knowledge-network-title">GitHub Stars 知识网络</title>
  <desc id="knowledge-network-desc">五个 GitHub 仓库通过搜索、AI 与标签节点连接到本地数据库。</desc>

  <defs>
    <linearGradient id="link-blue" x1="80" y1="90" x2="470" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8EB7FF" />
      <stop offset="1" stop-color="#4D7CFE" />
    </linearGradient>
    <linearGradient id="link-violet" x1="90" y1="500" x2="485" y2="95" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7AA2FF" />
      <stop offset="1" stop-color="#8A5CF6" />
    </linearGradient>
    <linearGradient id="database-icon" x1="261" y1="255" x2="319" y2="317" gradientUnits="userSpaceOnUse">
      <stop stop-color="#155EEF" />
      <stop offset="1" stop-color="#245BDB" />
    </linearGradient>
    <linearGradient id="ai-icon" x1="424" y1="184" x2="466" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5C69F5" />
      <stop offset="1" stop-color="#874BE8" />
    </linearGradient>
    <radialGradient id="center-halo" cx="0" cy="0" r="1" gradientTransform="translate(291 286) rotate(90) scale(170)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF2FF" stop-opacity="0.78" />
      <stop offset="1" stop-color="#F4F7FF" stop-opacity="0" />
    </radialGradient>
    <pattern id="dot-grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.15" fill="#AFC7FA" />
    </pattern>
    <mask id="grid-fade">
      <radialGradient id="grid-mask-gradient" cx="0" cy="0" r="1" gradientTransform="translate(292 292) rotate(90) scale(290 278)" gradientUnits="userSpaceOnUse">
        <stop offset="0.12" stop-color="white" />
        <stop offset="0.76" stop-color="white" stop-opacity="0.78" />
        <stop offset="1" stop-color="white" stop-opacity="0" />
      </radialGradient>
      <rect width="560" height="600" fill="url(#grid-mask-gradient)" />
    </mask>
    <filter id="card-shadow" x="-25%" y="-25%" width="150%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1E3A6D" flood-opacity="0.10" />
    </filter>
    <filter id="node-shadow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#245BDB" flood-opacity="0.15" />
    </filter>
    <filter id="soft-glow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" />
    </filter>
  </defs>

  <!-- Transparent canvas: only a softly fading point field is painted. -->
  <ellipse cx="291" cy="286" rx="205" ry="190" fill="url(#center-halo)" />
  <rect x="16" y="12" width="528" height="576" fill="url(#dot-grid)" opacity="0.46" mask="url(#grid-fade)" />

  <!-- Knowledge graph links -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M179 146H202V220L238 251" stroke="url(#link-blue)" stroke-width="1.6" opacity="0.54" />
    <path d="M367 81H338V98L320 111" stroke="url(#link-violet)" stroke-width="1.6" opacity="0.55" />
    <path d="M290 156V228" stroke="url(#link-blue)" stroke-width="1.8" opacity="0.66" />
    <path d="M342 250H376L407 219L414 216" stroke="url(#link-violet)" stroke-width="1.8" opacity="0.62" />
    <path d="M342 302H366V329H382" stroke="url(#link-blue)" stroke-width="1.7" opacity="0.56" />
    <path d="M185 446H211V384L238 341" stroke="url(#link-violet)" stroke-width="1.6" opacity="0.54" />
    <path d="M290 340V417" stroke="url(#link-blue)" stroke-width="1.8" opacity="0.62" />
    <path d="M295 444H328V489H352" stroke="url(#link-violet)" stroke-width="1.7" opacity="0.56" />
    <path d="M202 220H166V253H133" stroke="#9FBCFF" stroke-width="1.3" stroke-dasharray="3 6" opacity="0.48" />
    <path d="M376 250V269H405" stroke="#A689FA" stroke-width="1.3" stroke-dasharray="3 6" opacity="0.46" />
    <path d="M211 384H180V362H145" stroke="#9FBCFF" stroke-width="1.3" stroke-dasharray="3 6" opacity="0.42" />
    <path d="M328 489V531H300" stroke="#A689FA" stroke-width="1.3" stroke-dasharray="3 6" opacity="0.44" />
  </g>

  <!-- Junction points -->
  <g>
    <circle cx="202" cy="220" r="6.5" fill="#7DA2FF" opacity="0.14" filter="url(#soft-glow)" />
    <circle cx="202" cy="220" r="3.2" fill="#5C7CFA" stroke="white" stroke-width="1.5" />
    <circle cx="338" cy="81" r="3.2" fill="#7C5CFC" stroke="white" stroke-width="1.5" />
    <circle cx="376" cy="250" r="3.2" fill="#7457F5" stroke="white" stroke-width="1.5" />
    <circle cx="366" cy="329" r="3.2" fill="#4D7CFE" stroke="white" stroke-width="1.5" />
    <circle cx="211" cy="384" r="3.2" fill="#7457F5" stroke="white" stroke-width="1.5" />
    <circle cx="328" cy="489" r="3.2" fill="#7457F5" stroke="white" stroke-width="1.5" />
    <circle cx="133" cy="253" r="2.6" fill="#8FAEFF" />
    <circle cx="405" cy="269" r="2.6" fill="#9B79FB" />
    <circle cx="145" cy="362" r="2.6" fill="#8FAEFF" />
    <circle cx="300" cy="531" r="2.6" fill="#9B79FB" />
  </g>

  <!-- Search node -->
  <g filter="url(#node-shadow)">
    <circle cx="290" cy="125" r="31" fill="white" fill-opacity="0.96" stroke="#CFE0FF" stroke-width="1.5" />
    <circle cx="290" cy="125" r="23" fill="#EDF4FF" />
    <circle cx="286" cy="121" r="8.5" stroke="#3977F6" stroke-width="2.4" />
    <path d="M292.5 127.5L300.5 135.5" stroke="#3977F6" stroke-width="2.4" stroke-linecap="round" />
  </g>

  <!-- AI node -->
  <g filter="url(#node-shadow)">
    <circle cx="445" cy="205" r="31" fill="white" fill-opacity="0.96" stroke="#DED5FF" stroke-width="1.5" />
    <circle cx="445" cy="205" r="23" fill="#F5F1FF" />
    <path d="M444.5 192.5C445.6 198.9 449.1 202.4 455.5 203.5C449.1 204.6 445.6 208.1 444.5 214.5C443.4 208.1 439.9 204.6 433.5 203.5C439.9 202.4 443.4 198.9 444.5 192.5Z" stroke="url(#ai-icon)" stroke-width="2.1" stroke-linejoin="round" />
    <path d="M455 190V196M452 193H458" stroke="#7856F4" stroke-width="1.9" stroke-linecap="round" />
  </g>

  <!-- Tag node -->
  <g filter="url(#node-shadow)">
    <circle cx="268" cy="444" r="27" fill="white" fill-opacity="0.97" stroke="#D3E2FF" stroke-width="1.5" />
    <circle cx="268" cy="444" r="20" fill="#EFF5FF" />
    <path d="M258 438.2L265.1 431H278V443.9L266.2 455.8L256 445.6L258 438.2Z" stroke="#3977F6" stroke-width="2.2" stroke-linejoin="round" />
    <circle cx="272.4" cy="436.6" r="2.2" fill="#3977F6" />
  </g>

  <!-- Central local database -->
  <g filter="url(#node-shadow)">
    <rect x="238" y="228" width="104" height="112" rx="24" fill="white" fill-opacity="0.98" stroke="#DCE6F7" stroke-width="1.5" />
    <rect x="252" y="242" width="76" height="76" rx="19" fill="#F4F8FF" />
    <ellipse cx="290" cy="262" rx="19" ry="8" stroke="url(#database-icon)" stroke-width="3.5" />
    <path d="M271 262V284C271 288.4 279.5 292 290 292C300.5 292 309 288.4 309 284V262" stroke="url(#database-icon)" stroke-width="3.5" />
    <path d="M271 273C271 277.4 279.5 281 290 281C300.5 281 309 277.4 309 273" stroke="url(#database-icon)" stroke-width="3.5" />
    <text x="290" y="314" text-anchor="middle" fill="#33527F" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10.5" font-weight="650" letter-spacing="0.7">LOCAL DATA</text>
  </g>

  <!-- Repository card: ant-design -->
  <g filter="url(#card-shadow)">
    <rect x="35" y="100" width="144" height="90" rx="14" fill="white" fill-opacity="0.97" stroke="#DEE6F2" />
    <rect x="48" y="115" width="32" height="32" rx="9" fill="#F0EDFF" />
    <path d="M64 121.8L66.1 128.1H72.7L67.4 132L69.4 138.3L64 134.4L58.6 138.3L60.6 132L55.3 128.1H61.9L64 121.8Z" fill="#7357F5" />
    <text x="89" y="126.5" fill="#15233B" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" font-weight="700">ant-design</text>
    <text x="89" y="143.5" fill="#64748B" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10.5">ant-design</text>
