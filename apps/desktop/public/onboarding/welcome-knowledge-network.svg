    <circle cx="105" cy="167.4" r="3.6" fill="#2D83D5" />
    <text x="113" y="171" fill="#6A778A" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8.8">TypeScript</text>
  </g>

