    <rect x="381" y="50" width="32" height="32" rx="9" fill="#EEF5FF" />
    <path d="M397 56L399.1 62.4H405.8L400.4 66.3L402.5 72.7L397 68.7L391.5 72.7L393.6 66.3L388.2 62.4H394.9L397 56Z" fill="#3977F6" />
    <text x="422" y="61.5" fill="#15233B" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.2" font-weight="700">excellent-go</text>
    <text x="422" y="78.5" fill="#64748B" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10.3">awesome-go</text>
    <path d="M383 99.1L384.6 103.8H389.5L385.5 106.7L387 111.4L383 108.5L379 111.4L380.5 106.7L376.5 103.8H381.4L383 99.1Z" stroke="#6941F5" stroke-width="1.45" stroke-linejoin="round" />
    <text x="394" y="109" fill="#4F5F76" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9.5" font-weight="550">12.3k</text>
    <circle cx="440" cy="105.4" r="3.6" fill="#00ADD8" />
    <text x="448" y="109" fill="#6A778A" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9">Go</text>
  </g>

  <!-- Repository card: langchain-ai -->
  <g filter="url(#card-shadow)">
    <rect x="382" y="280" width="153" height="100" rx="14" fill="white" fill-opacity="0.97" stroke="#DEE6F2" />
    <rect x="396" y="295" width="32" height="32" rx="9" fill="#F0EDFF" />
    <path d="M412 301L414.1 307.4H420.8L415.4 311.3L417.5 317.7L412 313.7L406.5 317.7L408.6 311.3L403.2 307.4H409.9L412 301Z" fill="#7357F5" />
    <text x="437" y="306.5" fill="#15233B" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.2" font-weight="700">langchain-ai</text>
    <text x="437" y="323.5" fill="#64748B" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10.3">langchain</text>
    <path d="M398 350.1L399.6 354.8H404.5L400.5 357.7L402 362.4L398 359.5L394 362.4L395.5 357.7L391.5 354.8H396.4L398 350.1Z" stroke="#6941F5" stroke-width="1.45" stroke-linejoin="round" />
    <text x="409" y="360" fill="#4F5F76" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9.5" font-weight="550">72.1k</text>
    <circle cx="455" cy="356.4" r="3.6" fill="#3572A5" />
    <text x="463" y="360" fill="#6A778A" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8.8">Python</text>
  </g>

